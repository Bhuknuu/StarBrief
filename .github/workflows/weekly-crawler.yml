# ══════════════════════════════════════════════════════════
# StarBrief  -  Weekly Deep Crawler Workflow
# Runs every Sunday at 3:00 AM IST (9:30 PM UTC Saturday)
# Full scrape + discovery queue processing + Gemini classification
# ══════════════════════════════════════════════════════════

name: " Weekly Deep Crawler"

on:
  # schedule:
  #   - cron: "30 21 * * 0"        # 3:00 AM IST Sunday = 9:30 PM UTC Saturday
  #   Uncomment schedule above to enable automatic weekly runs.
  workflow_dispatch:                 # run manually from the Actions tab

permissions:
  contents: read

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GH_PAT }}

jobs:
  weekly-crawler:
    name: "Run Weekly Deep Crawler"
    runs-on: ubuntu-latest
    timeout-minutes: 45              # budget: 30-45 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly deep crawler
        run: python -m pipeline.weekly

      - name: Notify dashboard (optional)
        if: success()
        run: |
          if [ -n "${{ secrets.WEBHOOK_SECRET }}" ]; then
            curl -s -X POST "${{ secrets.VERCEL_URL }}/api/trigger/daily" \
              -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{"source": "github_actions", "run_type": "weekly"}'
          fi
        continue-on-error: true
